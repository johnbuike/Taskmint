function ImageLabelTask({task,C,onEarn,onClose}){
  const [cur,setCur]=useState(0);const [sel,setSel]=useState({});const [done,setDone]=useState(false);
  const toggle=(l)=>setSel(p=>({...p,[l]:!p[l]}));
  const next=()=>{if(cur<task.images.length-1){setCur(c=>c+1);setSel({});}else{setDone(true);setTimeout(()=>{onEarn(task.reward);onClose();},1800);}};
  const hasAny=Object.values(sel).some(Boolean);
  if(done)return <Success reward={task.reward} C={C}/>;
  return <><p style={{color:C.sub,fontSize:12,fontWeight:600,marginBottom:8}}>Image {cur+1} of {task.images.length}</p>
  <p style={{color:C.text,fontWeight:700,fontSize:15,marginBottom:12}}>Select all labels that apply:</p>
  <img src={task.images[cur]} alt="" style={{width:"100%",borderRadius:12,marginBottom:14,maxHeight:200,objectFit:"cover"}}/>
  <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:18}}>
    {task.labels.map(l=><button key={l} onClick={()=>toggle(l)} style={{padding:"7px 14px",borderRadius:8,fontSize:13,fontWeight:600,border:`1.5px solid ${sel[l]?C.accent:C.border}`,background:sel[l]?C.accentSoft:"transparent",color:sel[l]?C.accent:C.sub,cursor:"pointer"}}>{l}</button>)}
  </div>
  <button onClick={next} disabled={!hasAny} style={{width:"100%",padding:"13px",borderRadius:12,border:"none",background:hasAny?`linear-gradient(135deg,${C.accent},#818cf8)`:"#ccc",color:"#fff",fontWeight:700,fontSize:15,cursor:hasAny?"pointer":"not-allowed"}}>
    {cur<task.images.length-1?"Next Image →":"Submit & Earn 🎉"}
  </button></>;
}

        <label style={{display:"block",color:C.sub,fontSize:13,fontWeight:700,marginBottom:6}}>Password</label>
        <input value={form.pass} onChange={e=>set("pass",e.target.value)} placeholder="••••••••" type="password" style={{width:"100%",background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:14,marginBottom:18}}/>
        <button onClick={submit} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${C.accent},#818cf8)`,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",boxShadow:`0 8px 24px ${C.accent}44`}}>{mode==="login"?"Sign In →":"Create Free Account →"}</button>
        <p style={{textAlign:"center",color:C.muted,fontSize:11,marginTop:12,fontFamily:"'JetBrains Mono',monospace"}}>Demo · No real data stored · Built by JalbinX</p>
      </div>
    </div>
  </div>;
}

function Dashboard({username,C,dark,toggleDark,onLogout}){
  const [balance,setBalance]=useState(0);const [completed,setCompleted]=useState(0);const [earnings,setEarnings]=useState([]);
  const [activeTask,setActiveTask]=useState(null);const [showW,setShowW]=useState(false);
  const [filter,setFilter]=useState("All");const [tab,setTab]=useState("tasks");const [toast,setToast]=useState(null);
  const dcol=DC(C);const cats=["All",...new Set(TASKS.map(t=>t.category))];const filtered=filter==="All"?TASKS:TASKS.filter(t=>t.category===filter);
  const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),3000);};
  const handleEarn=(amt)=>{const a=Math.round(amt*100)/100;setBalance(p=>Math.round((p+a)*100)/100);setCompleted(p=>p+1);setEarnings(p=>[{amount:a,task:activeTask.title,time:new Date().toLocaleTimeString()},...p]);showToast(`+$${a.toFixed(2)} earned! 🎉`);};
  const handleWithdraw=()=>{setBalance(0);showToast("Withdrawal submitted! 💸");};
  return <div style={{minHeight:"100vh",background:C.bg,color:C.text}}>
    <Toast msg={toast}/>
    {activeTask&&<TaskModal task={activeTask} C={C} onEarn={handleEarn} onClose={()=>setActiveTask(null)}/>}
    {showW&&<WithdrawModal balance={balance} C={C} onClose={()=>setShowW(false)} onWithdraw={handleWithdraw}/>}
    <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 22px",height:64,borderBottom:`1px solid ${C.border}`,background:C.bg,position:"sticky",top:0,zIndex:50,flexWrap:"wrap",gap:6}}>
      <Logo C={C}/>
      <div style={{display:"flex",gap:5}}>
        {["tasks","earnings","leaderboard","faq"].map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"7px 13px",borderRadius:8,border:"none",background:tab===t?C.accent:"transparent",color:tab===t?"#fff":C.muted,fontSize:12,fontWeight:700,cursor:"pointer",textTransform:"capitalize"}}>{t==="faq"?"FAQ":t}</button>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{textAlign:"right"}}><p style={{color:C.muted,fontSize:11,fontWeight:600}}>Balance</p><p style={{color:C.green,fontWeight:800,fontSize:20}}>${balance.toFixed(2)}</p></div>
        <button onClick={()=>setShowW(true)} style={{background:`linear-gradient(135deg,${C.green},#059669)`,color:"#fff",border:"none",padding:"9px 18px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer"}}>Withdraw</button>
        <button onClick={toggleDark} style={{width:36,height:36,borderRadius:9,border:`1px solid ${C.border}`,background:C.surface,color:C.text,fontSize:15,cursor:"pointer"}}>{dark?"☀️":"🌙"}</button>
        <button onClick={onLogout} style={{background:"none",border:`1px solid ${C.border}`,color:C.muted,padding:"7px 13px",borderRadius:9,fontSize:12,cursor:"pointer",fontWeight:600}}>Logout</button>
      </div>
    </header>
    <main style={{maxWidth:1100,margin:"0 auto",padding:"28px 18px"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12,marginBottom:28}}>
        {[{icon:"✅",l:"Tasks Done",v:completed},{icon:"💰",l:"Balance",v:`$${balance.toFixed(2)}`},{icon:"📈",l:"Avg/Task",v:completed?`$${(balance/completed).toFixed(2)}`:"$0.00"},{icon:"🔥",l:"Available",v:"10,302"}].map((s,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:"18px 20px",boxShadow:`0 4px 16px ${C.shadow}`}}>
          <p style={{fontSize:22,marginBottom:6}}>{s.icon}</p><p style={{fontWeight:800,fontSize:22,color:C.text}}>{s.v}</p><p style={{color:C.muted,fontSize:12,fontWeight:600,marginTop:3}}>{s.l}</p>
        </div>)}
      </div>
      {tab==="tasks"&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:22}}>
          {cats.map(c=><button key={c} onClick={()=>setFilter(c)} style={{padding:"7px 16px",borderRadius:20,fontSize:13,fontWeight:600,border:filter===c?"none":`1px solid ${C.border}`,background:filter===c?C.accent:"transparent",color:filter===c?"#fff":C.muted,cursor:"pointer"}}>{c}</button>)}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:16}}>
          {filtered.map(task=><div key={task.id} className="card-hover" style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden",boxShadow:`0 4px 20px ${C.shadow}`}}>
            {task.images?<img src={task.images[0]} alt="" style={{width:"100%",height:130,objectFit:"cover"}}/>:<div style={{width:"100%",height:130,background:C.accentSoft,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44}}>{task.icon}</div>}
            <div style={{padding:18}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><Badge label={task.category} color={C.accent}/><Badge label={task.diff} color={dcol[task.diff]}/></div>
              <p style={{color:C.text,fontWeight:700,fontSize:15,marginBottom:5,lineHeight:1.3}}>{task.title}</p>
              <p style={{color:C.muted,fontSize:13,lineHeight:1.6,marginBottom:12,fontWeight:500}}>{task.desc}</p>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                <div><p style={{color:C.green,fontWeight:800,fontSize:20}}>${task.reward.toFixed(2)}</p><p style={{color:C.muted,fontSize:11,marginTop:2,fontWeight:500}}>{task.time} · {task.open.toLocaleString()} open</p></div>
                <button onClick={()=>setActiveTask(task)} style={{background:`linear-gradient(135deg,${C.accent},#818cf8)`,color:"#fff",border:"none",padding:"9px 18px",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer"}}>Start →</button>
              </div>
            </div>
          </div>)}
        </div>
      </>}
      {tab==="earnings"&&<div>
        <h2 style={{fontWeight:800,fontSize:24,marginBottom:22,color:C.text}}>Earnings History</h2>
        {earnings.length===0?<div style={{textAlign:"center",padding:"70px 0",color:C.muted}}><p style={{fontSize:44,marginBottom:14}}>💸</p><p style={{fontSize:15,fontWeight:500}}>No earnings yet. Complete tasks to start!</p></div>:
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {earnings.map((e,i)=><div key={i} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"15px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><p style={{color:C.text,fontWeight:600,fontSize:14}}>{e.task}</p><p style={{color:C.muted,fontSize:12,marginTop:2}}>{e.time}</p></div>
            <p style={{color:C.green,fontWeight:800,fontSize:18}}>+${e.amount.toFixed(2)}</p>
          </div>)}
          <div style={{background:C.card,border:`1px solid ${C.green}`,borderRadius:12,padding:"15px 20px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <p style={{color:C.text,fontWeight:700}}>Total Balance</p>
            <p style={{color:C.green,fontWeight:800,fontSize:22}}>${balance.toFixed(2)}</p>
          </div>
        </div>}
      </div>}
      {tab==="leaderboard"&&<div>
        <h2 style={{fontWeight:800,fontSize:24,marginBottom:6,color:C.text}}>Top Earners</h2>
        <p style={{color:C.muted,fontSize:14,marginBottom:24,fontWeight:500}}>Complete more tasks to climb the rankings</p>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[{name:username,earned:balance,tasks:completed,flag:"⭐",isYou:true},...LEADERBOARD].sort((a,b)=>b.earned-a.earned).map((u,i)=><div key={u.name} style={{background:u.isYou?C.accentSoft:C.card,border:`1px solid ${u.isYou?C.accent:C.border}`,borderRadius:12,padding:"14px 20px",display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:i===0?"#f59e0b":i===1?"#94a3b8":i===2?"#cd7c2f":C.dim,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,color:i<3?"#000":C.muted,fontSize:13,flexShrink:0}}>#{i+1}</div>
            <div style={{flex:1}}><p style={{color:u.isYou?C.accent:C.text,fontWeight:700,fontSize:14}}>{u.flag} {u.isYou?"You ("+username+")":u.name}</p><p style={{color:C.muted,fontSize:12,marginTop:2}}>{u.tasks} tasks</p></div>
            <p style={{color:C.green,fontWeight:800,fontSize:18}}>${typeof u.earned==="number"?u.earned.toFixed(2):u.earned}</p>
          </div>)}
        </div>
      </div>}
      {tab==="faq"&&<FAQSection C={C}/>}
    </main>
    <footer style={{textAlign:"center",padding:"22px 0",borderTop:`1px solid ${C.border}`,color:C.muted,fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:500,marginTop:32}}>TASKMINT · BUILT BY JALBINX · buike@outlook.com · 2026</footer>
    <ChatWidget C={C}/>
  </div>;
}

function App(){
  const [screen,setScreen]=useState("landing");const [username,setUsername]=useState("");const [dark,setDark]=useState(false);
  const C=dark?DARK:LIGHT;
  useEffect(()=>{document.body.style.background=C.bg;document.body.style.color=C.text;},[dark,C]);
  const toggleDark=()=>setDark(d=>!d);
  return <>
    {screen==="landing"&&<Landing onEnter={()=>setScreen("auth")} C={C} dark={dark} toggleDark={toggleDark}/>}
    {screen==="auth"&&<AuthScreen onLogin={n=>{setUsername(n);setScreen("dashboard");}} C={C} dark={dark} toggleDark={toggleDark}/>}
    {screen==="dashboard"&&<Dashboard username={username} C={C} dark={dark} toggleDark={toggleDark} onLogout={()=>setScreen("landing")}/>}
  </>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
